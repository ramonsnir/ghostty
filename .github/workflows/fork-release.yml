# Fork release: build + (sign + notarize + DMG + Sparkle appcast) + publish a
# GitHub Release on every push to `main` of the ramon fork.
#
# This is FORK-ONLY. It is guarded to `ramonsnir/ghostty` so it never runs on
# the upstream `ghostty-org/ghostty` (origin). The inherited upstream workflows
# (release-tip / release-tag / test) are already inert on the fork — they are
# guarded by `github.repository_owner == 'ghostty-org'`, version-tag triggers, or
# `github.repository == 'ghostty-org/ghostty'` — so no neutering is needed.
#
# SIGNING IS OPTIONAL UNTIL ENROLLED: when the signing secrets are absent the
# workflow still builds the app (proving the pipeline + compile) and uploads the
# unsigned .app as a workflow artifact, but it does NOT create a release. Once the
# secrets below are set it signs, notarizes, builds a DMG, generates a signed
# appcast, and publishes the release.
#
# Required repo secrets for a real release (mirrors upstream naming, FORK-owned):
#   MACOS_CERTIFICATE        base64 of the Developer ID Application .p12
#   MACOS_CERTIFICATE_PWD    password for that .p12
#   MACOS_CERTIFICATE_NAME   identity name, e.g. "Developer ID Application: NAME (TEAMID)"
#   MACOS_CI_KEYCHAIN_PWD    any throwaway password for the temp CI keychain
#   APPLE_NOTARIZATION_ISSUER / _KEY_ID / _KEY   App Store Connect API key (.p8 + ids)
#   SPARKLE_PRIVATE_KEY      Sparkle EdDSA private key (from `generate_keys -x`)
#   SPARKLE_PUBLIC_KEY       Sparkle EdDSA public key (SUPublicEDKey value)

name: Fork Release

on:
  # MANUAL-ONLY by default. macOS CI minutes are billed at ~10x and a stuck Apple
  # notary can burn a whole 90-min job, so we do NOT auto-run on push. The PRIMARY,
  # FREE release path is the local build script `dist/macos/release-local.sh` on a
  # Mac (build + sign + notarize + DMG + appcast + gh release — $0). This workflow
  # remains as an opt-in fallback you can trigger by hand from the Actions tab.
  workflow_dispatch: {}

# Avoid overlapping releases racing on the same tag/latest pointer.
concurrency:
  group: fork-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create releases + upload assets

jobs:
  build:
    if: github.repository == 'ramonsnir/ghostty'
    # Native macOS 26 image. NOT macos-15: there, Xcode 26 runs via a framework
    # override cryptex whose MediaToolbox is missing a symbol, which crashes
    # AssetCatalogAgent when it renders the Liquid Glass `images/Ghostty.icon`
    # ("CompileAssetCatalogVariant failed / tool closed the connection"). On a
    # native macos-26 image Xcode 26 uses the real OS frameworks, so no crash.
    # (Upstream sidesteps this with Namespace.so runners, which the fork lacks.)
    runs-on: macos-26
    timeout-minutes: 90
    env:
      # Whether ALL signing secrets are present. Gates every sign/notarize/release
      # step; when false the job is a build-only smoke test. We require the FULL set
      # (not a subset) so a half-configured enrollment falls cleanly to the smoke
      # path instead of passing the gate then failing midway (empty codesign
      # identity) or shipping a broken updater (empty SUPublicEDKey).
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.MACOS_CERTIFICATE_PWD != '' && secrets.MACOS_CERTIFICATE_NAME != '' && secrets.MACOS_CI_KEYCHAIN_PWD != '' && secrets.APPLE_NOTARIZATION_ISSUER != '' && secrets.APPLE_NOTARIZATION_KEY_ID != '' && secrets.APPLE_NOTARIZATION_KEY != '' && secrets.SPARKLE_PRIVATE_KEY != '' && secrets.SPARKLE_PUBLIC_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for `git rev-list --count`

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Build the GhosttyKit xcframework AND the ghostty-host binary in one go.
      # `-Demit-macos-app=false` skips the (Linux-style) app bundle but still emits
      # the xcframework (default on macOS) and installs ghostty-host to zig-out/bin.
      - name: Compute version
        id: version
        run: |
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build GhosttyKit + ghostty-host
        run: |
          nix develop -c zig build \
            -Doptimize=ReleaseFast \
            -Demit-macos-app=false \
            -Dversion-string=0.0.0-fork-${{ steps.version.outputs.build }}
          test -f zig-out/bin/ghostty-host

      # Exercise the safety-critical ForkSetup planner (the sole guard against
      # clobbering a hand-managed host plist) BEFORE we ever sign/notarize/publish.
      # Ungated — a planner regression must fail the pipeline even on a smoke build.
      - name: Run ForkSetup unit tests
        # Best-effort gate (kept continue-on-error during macos-26 bring-up). The
        # planner's AUTHORITATIVE run is local (all 18 ForkSetupTests pass). The
        # macos-15 AssetCatalogAgent crash that motivated this should NOT occur on
        # the native macos-26 image (see the job's runs-on note); once macos-26 is
        # confirmed stable, drop continue-on-error to make this a hard gate again.
        continue-on-error: true
        run: |
          cd macos
          # NOTE: the Ghostty scheme's TestAction is Debug, so this builds
          # build/Debug — it does NOT produce the Release app. SYMROOT here only
          # keeps test output inside macos/build. The shippable Release artifact is
          # built solely by the explicit `-configuration Release` step below.
          xcodebuild test -scheme Ghostty \
            -jobs 1 \
            -destination 'platform=macOS' \
            -only-testing:GhosttyTests/ForkSetupTests \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILATION_CACHE_CAS_PATH="$RUNNER_TEMP/CompilationCache.noindex" \
            COMPILATION_CACHE_KEEP_CAS_DIRECTORY=YES

      - name: Setup Sparkle tools
        env:
          SPARKLE_VERSION: 2.9.0
        run: |
          mkdir -p .action/sparkle
          cd .action/sparkle
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-for-Swift-Package-Manager.zip" > sparkle.zip
          unzip -q sparkle.zip
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Build Ghostty.app
        run: |
          cd macos
          # SYMROOT="$PWD/build" lands the app at macos/build/Release/Ghostty.app —
          # exactly as build.nu does (build.nu:29). Without it xcodebuild writes to
          # DerivedData and every downstream path (bundle/sign/dmg) would break.
          xcodebuild -target Ghostty -configuration Release \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILATION_CACHE_CAS_PATH="$RUNNER_TEMP/CompilationCache.noindex" \
            COMPILATION_CACHE_KEEP_CAS_DIRECTORY=YES
          test -d build/Release/Ghostty.app || { echo "::error::app not at macos/build/Release/Ghostty.app"; exit 1; }

      # Bundle the host inside the app so it is signed + notarized as part of the
      # bundle, and so Sparkle (which updates the .app) carries new host builds.
      # The app's ForkSetup installs/reloads a LaunchAgent pointing at this path.
      - name: Bundle ghostty-host
        run: |
          APP="macos/build/Release/Ghostty.app"
          cp -f zig-out/bin/ghostty-host "$APP/Contents/MacOS/ghostty-host"
          chmod +x "$APP/Contents/MacOS/ghostty-host"

      # Bundle the MCP stdio shim alongside the host so it is signed + notarized as
      # part of the bundle and carried by Sparkle. The app's ForkSetup copies it
      # onto PATH (~/.local/bin/ghostty-mcp) on first launch so `claude mcp add
      # ghostty -- ghostty-mcp` works for a colleague. Pure Swift/Foundation SPM
      # package (NOT in Ghostty.xcodeproj), so it builds with the system swift.
      - name: Build + bundle ghostty-mcp shim
        run: |
          swift build -c release --package-path macos/mcp-shim
          APP="macos/build/Release/Ghostty.app"
          cp -f macos/mcp-shim/.build/release/ghostty-mcp "$APP/Contents/MacOS/ghostty-mcp"
          chmod +x "$APP/Contents/MacOS/ghostty-mcp"
          test -x "$APP/Contents/MacOS/ghostty-mcp"

      # Bundle the agent-manager sidecar (Agent Queue + Manager) as dist/ + package.json
      # into Contents/Resources/agent-manager (the path resolveSidecarDir() prefers). We
      # bundle ONLY dist + package.json — NOT node_modules: it is ~271MB and ships a native
      # ~215MB `claude` Mach-O (in @anthropic-ai/claude-agent-sdk-darwin-arm64) that would
      # break notarization. `npm run build` = tsc + esbuild: esbuild RE-bundles dist/index.js
      # with the Claude Agent SDK's JAVASCRIPT inlined (a few MB, NO native binary — it's
      # marked external), so the SUMMARIZER works for colleagues from dist alone: model.ts
      # points the SDK at the colleague's ALREADY-INSTALLED `claude` via
      # pathToClaudeCodeExecutable (GHOSTTY_CLAUDE_PATH, set by AgentManagerController). The
      # Agent QUEUE has ZERO npm deps and runs from dist regardless. package.json carries
      # "type":"module" (node needs it to treat dist/*.js as ESM). RUNTIME PREREQ on the
      # colleague's Mac: `node` on PATH (and, for the summarizer, `claude` on PATH — both
      # handled gracefully if absent). Uses the runner's system node, NOT nix.
      - name: Build + bundle agent-manager sidecar (dist only; SDK JS inlined)
        run: |
          ( cd macos/agent-manager && npm ci && npm run build )
          test -f macos/agent-manager/dist/index.js
          # Sanity: SDK JS inlined (summarizer works with no node_modules) + no bare
          # @anthropic-ai import survived (which would throw at runtime under dist-only).
          grep -q "Claude Code executable" macos/agent-manager/dist/index.js \
            || { echo "ERROR: Agent SDK JS not inlined into dist/index.js"; exit 1; }
          ! grep -qE '(import|require)\(["'"'"'"]@anthropic-ai' macos/agent-manager/dist/index.js \
            || { echo "ERROR: a bare @anthropic-ai import survived bundling"; exit 1; }
          APP="macos/build/Release/Ghostty.app"
          DST="$APP/Contents/Resources/agent-manager"
          rm -rf "$DST"; mkdir -p "$DST"
          cp -R macos/agent-manager/dist "$DST/dist"
          cp macos/agent-manager/package.json "$DST/package.json"
          rm -rf "$DST/node_modules"   # never let node_modules into the notarized bundle
          test -f "$DST/dist/index.js" && test -f "$DST/package.json"

      # Bundle the colleague-onboarding files into Contents/Resources so they travel
      # with the app (carried by Sparkle, no repo clone needed): the Claude Code
      # agent-state hooks (dashboard per-tile state + queue auto-close depend on them)
      # and ONBOARDING.md (the cheat sheet the seed/welcome point at). Pure data —
      # notarization-safe (the app seal covers Resources/).
      - name: Bundle claude-hooks + ONBOARDING.md
        run: |
          APP="macos/build/Release/Ghostty.app"
          HOOKS_DST="$APP/Contents/Resources/claude-hooks"
          rm -rf "$HOOKS_DST"; mkdir -p "$HOOKS_DST"
          cp -R example/claude-hooks/. "$HOOKS_DST/"
          cp ONBOARDING.md "$APP/Contents/Resources/ONBOARDING.md"
          test -f "$HOOKS_DST/ghostty-agent-state.sh" && test -f "$APP/Contents/Resources/ONBOARDING.md"

      - name: Inject version + updater keys into Info.plist
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          PLIST="macos/build/Release/Ghostty.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :GhosttyCommit ${{ steps.version.outputs.commit }}" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Add :GhosttyCommit string ${{ steps.version.outputs.commit }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.commit }}" "$PLIST"
          if [ "$HAS_SIGNING" = "true" ]; then
            # Pin the fork's real Sparkle public key (the committed plist carries a
            # fail-closed placeholder). Then remove the hard-off override: dev builds
            # ship SUEnableAutomaticChecks=false; deleting it hands control to the
            # `auto-update` config key (the seeded fork config sets `auto-update =
            # check`) / Sparkle's first-launch update-consent prompt — it does NOT by
            # itself force background checks.
            /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey $SPARKLE_PUBLIC_KEY" "$PLIST"
            /usr/libexec/PlistBuddy -c "Delete :SUEnableAutomaticChecks" "$PLIST" || true
          fi

      # ---- Everything below requires signing secrets ----

      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.MACOS_CI_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          rm -f certificate.p12

      - name: Codesign app bundle
        if: env.HAS_SIGNING == 'true'
        env:
          CERT_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          APP="macos/build/Release/Ghostty.app"
          sign() { /usr/bin/codesign --verbose -f -s "$CERT_NAME" -o runtime "$@"; }
          # Inside-out: sign nested code before the outer bundle.
          sign "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc"
          sign "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"
          sign "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
          sign "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"
          sign "$APP/Contents/Frameworks/Sparkle.framework"
          sign "$APP/Contents/PlugIns/DockTilePlugin.plugin"
          # The bundled host runs under launchd; hardened runtime, no special entitlements.
          sign "$APP/Contents/MacOS/ghostty-host"
          # The MCP shim is copied onto PATH by ForkSetup and exec'd by Claude Code;
          # sign it so the loose copy passes Gatekeeper. Hardened runtime, no entitlements.
          sign "$APP/Contents/MacOS/ghostty-mcp"
          # Finally the app bundle itself, with its entitlements.
          /usr/bin/codesign --verbose -f -s "$CERT_NAME" -o runtime \
            --entitlements "macos/Ghostty.entitlements" "$APP"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$APP"

      # Notarize + STAPLE THE APP FIRST, so the .app a colleague drags out of the
      # DMG carries its own stapled ticket and launches OFFLINE without a Gatekeeper
      # round-trip. The DMG is then built from the already-stapled app.
      - name: Notarize + staple app
        if: env.HAS_SIGNING == 'true'
        env:
          APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
        run: |
          APP="macos/build/Release/Ghostty.app"
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          # Store the profile once; reused to notarize the DMG below.
          xcrun notarytool store-credentials "notarytool-profile" \
            --key notarization_key.p8 \
            --key-id "$APPLE_NOTARIZATION_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm -f notarization_key.p8
          # notarytool needs an archive; ditto preserves the bundle's symlinks.
          ditto -c -k --keepParent "$APP" notarize-app.zip
          xcrun notarytool submit notarize-app.zip --keychain-profile "notarytool-profile" --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          rm -f notarize-app.zip

      - name: Create DMG
        if: env.HAS_SIGNING == 'true'
        env:
          CERT_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          npm install --global create-dmg
          # Output into a FRESH empty dir so a stale/leftover DMG can never be
          # mistaken for this run's artifact. create-dmg exits non-zero in some
          # benign cases (e.g. it doesn't codesign the DMG itself), so we don't
          # trust its rc — we assert exactly one DMG was produced in the clean dir.
          rm -rf dmgout && mkdir dmgout
          create-dmg --identity="$CERT_NAME" "macos/build/Release/Ghostty.app" dmgout || true
          shopt -s nullglob
          dmgs=( dmgout/Ghostty*.dmg )
          if [ ${#dmgs[@]} -ne 1 ]; then
            echo "::error::create-dmg did not produce exactly one DMG (found ${#dmgs[@]})"; exit 1
          fi
          mv "${dmgs[0]}" ./Ghostty.dmg

      - name: Notarize + staple DMG
        if: env.HAS_SIGNING == 'true'
        run: |
          xcrun notarytool submit "Ghostty.dmg" --keychain-profile "notarytool-profile" --wait
          xcrun stapler staple "Ghostty.dmg"
          xcrun stapler validate "Ghostty.dmg"

      - name: Generate Sparkle appcast
        if: env.HAS_SIGNING == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GHOSTTY_BUILD: ${{ steps.version.outputs.build }}
          GHOSTTY_COMMIT: ${{ steps.version.outputs.commit }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > signing.key
          sign_update -f signing.key Ghostty.dmg > sign_update.txt
          rm -f signing.key
          export GHOSTTY_DMG_URL="https://github.com/${{ github.repository }}/releases/download/build-${GHOSTTY_BUILD}-${GHOSTTY_COMMIT}/Ghostty.dmg"
          export GHOSTTY_PUBDATE="$(date -u +'%a, %d %b %Y %H:%M:%S +0000')"
          # Track what actually shipped rather than a hardcoded floor: read the
          # bundle's LSMinimumSystemVersion (fall back to 13.0 if absent).
          PLIST="macos/build/Release/Ghostty.app/Contents/Info.plist"
          export GHOSTTY_MIN_MACOS="$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$PLIST" 2>/dev/null || echo 13.0)"
          python3 ./dist/macos/fork_appcast.py
          test -f appcast.xml

      - name: Publish GitHub Release
        if: env.HAS_SIGNING == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GHOSTTY_BUILD: ${{ steps.version.outputs.build }}
          GHOSTTY_COMMIT: ${{ steps.version.outputs.commit }}
        run: |
          # Unique per commit (count can repeat across rebases/merges) + tag the EXACT
          # built commit. A workflow_dispatch re-run on the same commit reuses the tag.
          TAG="build-${GHOSTTY_BUILD}-${GHOSTTY_COMMIT}"
          # Idempotent publish WITHOUT a destructive delete window (a delete-then-failed-
          # create would leave `releases/latest/download/...` 404ing): create the release
          # if it doesn't exist, then (re)upload assets with --clobber, then ensure latest.
          # Notes to a file + --notes-file (an inline $(cat <<EOF) heredoc is mishandled
          # by older bash inside $()).
          cat > release-notes.md <<EOF
          **Ghostty (ramon)** — a personal fork of Ghostty that runs side-by-side with the official build.

          **Install (2 min):** download \`Ghostty.dmg\` below → drag it to \`/Applications\` → open it → **relaunch once** (the hosted terminal backend turns on for the second launch). It's signed + notarized, so it should open cleanly; if macOS ever complains, right-click → Open.

          **New here?** Start with the onboarding guide (install, the \`ctrl+a\` keybind cheat sheet, what's optional):
          https://github.com/${{ github.repository }}/blob/main/ONBOARDING.md

          _Built from ${GHOSTTY_COMMIT}._
          EOF
          gh release create "$TAG" --target "${{ github.sha }}" \
            --title "Ghostty (ramon) build ${GHOSTTY_BUILD} (${GHOSTTY_COMMIT})" \
            --notes-file release-notes.md \
            --latest 2>/dev/null || true
          # --latest makes `releases/latest/download/{Ghostty.dmg,appcast.xml}`
          # resolve here, which is the stable URL Sparkle's feed points at.
          gh release upload "$TAG" Ghostty.dmg appcast.xml --clobber
          gh release edit "$TAG" --latest

      # Zip with --symlinks first: upload-artifact dereferences symlinks, which
      # would flatten Sparkle.framework's Versions/Current and produce a bloated,
      # non-runnable bundle. A zip preserves the bundle structure.
      - name: Package unsigned app (no signing secrets)
        if: env.HAS_SIGNING != 'true'
        run: |
          cd macos/build/Release
          zip -9 -r --symlinks "$RUNNER_TEMP/ghostty-ramon-unsigned.zip" Ghostty.app

      - name: Upload unsigned app (no signing secrets)
        if: env.HAS_SIGNING != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ghostty-ramon-unsigned-${{ steps.version.outputs.commit }}
          path: ${{ runner.temp }}/ghostty-ramon-unsigned.zip
          retention-days: 7
